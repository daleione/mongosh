# MongoDB Shell (mongosh) Configuration File
# Configuration file uses TOML format
# Documentation: https://github.com/daleione/mongosh/blob/main/docs/config.md

# ============================================
# Connection Configuration
# ============================================
[connection]

# Named datasources with their connection URIs
# You can define multiple datasources and switch between them using -d flag
# Example: mongosh -d card_prod
[connection.datasources]
local = "mongodb://localhost:27017"

# Default datasource to use when -d flag is not specified
# If not set, will use the first available datasource or fall back to command-line URI
default_datasource = "local"

# Connection timeout in seconds
# Range: 1-300
timeout = 30

# Number of retry attempts on connection failure
# Range: 0-10
retry_attempts = 3

# Maximum connection pool size
# Range: 1-100
max_pool_size = 10

# Minimum connection pool size
# Range: 0-max_pool_size
min_pool_size = 2

# Connection idle timeout in seconds
# This setting controls when a connection is considered stale and needs health check
# If a connection is idle (no activity) for longer than this duration, the shell will
# automatically verify the connection health before the next operation to prevent
# "Broken pipe" errors when the server has closed the connection.
# Range: 60-3600 (default: 300, i.e., 5 minutes)
# Note: MongoDB driver also performs heartbeat checks every 30 seconds to detect dead connections
idle_timeout = 300


# ============================================
# Display Configuration
# ============================================
[display]

# Output format
# Options:
#   - shell: MongoDB Shell compatible format (recommended)
#   - json: Compact JSON format
#   - json-pretty: Formatted JSON
#   - table: ASCII table format
#   - compact: Minimal summary
format = "shell"

# Enable colored output
# Options: true, false
color_output = true

# Number of results per page
# Range: 1-1000
page_size = 20

# Enable syntax highlighting
# Options: true, false
syntax_highlighting = true

# Show command execution time
# Options: true, false
show_timing = true

# JSON indentation (number of spaces)
# Range: 0-8
json_indent = 2


# ============================================
# History Configuration
# ============================================
[history]

# Maximum number of history entries
# Range: 0-10000 (0 means unlimited)
max_size = 1000

# History file path
# Supports ~ for home directory
file_path = "~/.mongosh_history"

# Persist history to file
# Options: true, false
persist = true


# ============================================
# Logging Configuration
# ============================================
[logging]

# Log level
# Options: error, warn, info, debug, trace
# Recommended: warn (production), debug (development)
level = "warn"

# Log file path (optional)
# Leave empty or comment out to output to stdout
# Example: "/var/log/mongosh/app.log"
# file_path = ""

# Include timestamps in logs
# Options: true, false
timestamps = true


# ============================================
# Named Query
# ============================================

# Named query allow you to save frequently used query with a short name
#
# Parameter Substitution:
#   $1, $2, $3...  - Positional parameters
#   $*             - Raw aggregation (for numbers: 18, 25, 30)
#   $@             - String aggregation (quoted: 'admin', 'user')
#
# Important:
#   - Use '$1' (with quotes) for string parameters: {name: '$1'}
#   - Use $1 (without quotes) for numeric parameters: {age: $1}
#   - Arguments support quotes for spaces: query user "John Doe" 25
#   - Chinese characters work: query user 张三 18
[named_query]
# Add your named query here
# simple = "db.collection.find()"


# ============================================
# AI Completion Configuration
# ============================================
[ai]

# Enable AI-powered inline completion (based on DeepSeek FIM API)
# When enabled, the shell displays AI-generated suggestions as you type
# (shown in cyan italic text after the cursor).
# Press Ctrl+F to accept the full suggestion, or Alt+F to accept word-by-word.
# Options: true, false
enabled = false

# DeepSeek API Key
# Can also be set via the DEEPSEEK_API_KEY environment variable (takes precedence).
# Get your key at: https://platform.deepseek.com/api_keys
api_key = ""

# API base URL
base_url = "https://api.deepseek.com/beta"

# Model ID
model = "deepseek-chat"

# Maximum number of tokens to generate per completion
# Lower values reduce latency; higher values allow longer suggestions.
# Range: 8-256
max_tokens = 48

# Sampling temperature (0.0 = most deterministic, 1.0 = most random)
# For code completion, lower values (0.1-0.3) produce more predictable results.
# Range: 0.0-1.0
temperature = 0.2

# Debounce delay in milliseconds
# After you stop typing, the shell waits this long before sending an API request.
# Lower values feel more responsive but generate more API calls.
# Range: 50-2000
debounce_ms = 300

# Cache TTL in seconds
# How long AI completion results are kept in the local cache.
# Range: 10-300
cache_ttl_secs = 60

# Maximum number of cached completion entries
# Range: 32-1024
max_cache_entries = 256

# Number of recent history commands included in the AI prompt
# More history helps the model understand your current session intent,
# but increases token consumption.
# Range: 0-30
history_context_lines = 10

# Minimum input length to trigger AI completion
# Inputs shorter than this are handled by history hints only.
# Range: 1-20
min_trigger_length = 5


# ============================================
# MCP (Model Context Protocol) Configuration
# ============================================
[mcp]

# Enable or disable MCP server functionality
# Options: true, false
enabled = false

[mcp.security]

# Allow read operations (find, aggregate, count, distinct, etc.)
# Options: true, false
allow_read = true

# Allow write operations (insert, update)
# Options: true, false
allow_write = false

# Allow delete operations
# Options: true, false
allow_delete = false

# Maximum number of documents that can be returned in a single query
# Range: 1-10000
max_documents_per_query = 1000

# Maximum number of pipeline stages allowed in aggregation
# Range: 1-50
max_pipeline_stages = 10

# Query timeout in seconds
# Range: 1-300
query_timeout_seconds = 30

# List of allowed databases (empty array means all databases are allowed)
# Example: allowed_databases = ["testdb", "devdb"]
allowed_databases = []

# List of forbidden collection patterns (supports * as wildcard)
# Patterns can match either the full "database.collection" name or just the collection name
# Examples:
#   - "system.*" blocks all collections starting with "system."
#   - "*.internal" blocks all collections ending with ".internal"
#   - "admin.secrets" blocks exactly "admin.secrets"
forbidden_collections = ["system.*", "admin.*"]

# Enable audit logging for all MCP operations
# Options: true, false
audit_enabled = true


# ============================================
# MCP Configuration Examples
# ============================================

# Production Environment Example:
# [mcp]
# enabled = true
# [mcp.security]
# allow_read = true
# allow_write = true
# allow_delete = false
# max_documents_per_query = 500
# max_pipeline_stages = 5
# query_timeout_seconds = 60
# allowed_databases = ["production_db"]
# forbidden_collections = ["system.*", "admin.*", "*.internal", "*.sensitive"]
# audit_enabled = true

# Development Environment Example:
# [mcp]
# enabled = true
# [mcp.security]
# allow_read = true
# allow_write = true
# allow_delete = true
# max_documents_per_query = 100
# max_pipeline_stages = 10
# query_timeout_seconds = 30
# allowed_databases = []
# forbidden_collections = ["system.*"]
# audit_enabled = true

# Read-Only Environment Example:
# [mcp]
# enabled = true
# [mcp.security]
# allow_read = true
# allow_write = false
# allow_delete = false
# max_documents_per_query = 1000
# max_pipeline_stages = 10
# query_timeout_seconds = 30
# allowed_databases = []
# forbidden_collections = ["system.*", "admin.*"]
# audit_enabled = true
